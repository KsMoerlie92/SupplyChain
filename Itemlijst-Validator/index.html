<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal IHC — Itemlijst Validator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/nav.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- shared.js injects the nav bar automatically -->

<div class="site-wrapper">
  <section class="content-panel">
    <div class="section-head">
      <span class="red-mark"></span>Itemlijst Validator
    </div>

    <!-- Upload -->
    <div class="val-dz" id="val-dz"
      ondragover="valDragOver(event)" ondragleave="valDragLeave()" ondrop="valDrop(event)"
      onclick="document.getElementById('val-file-input').click()">
      <label class="val-dz-label">📋 Sleep een Itemlijst (.xlsx) hierheen of klik om te uploaden</label>
      <div class="val-filename" id="val-filename"></div>
      <input type="file" id="val-file-input" accept=".xlsx,.xls,.xlsm" onchange="handleValFile(event)">
    </div>

    <!-- Toolbar -->
    <div class="val-toolbar">
      <button class="btn-val btn-val-run" id="btn-val-run" disabled onclick="runValidation()">▶ Valideer</button>
      <button class="btn-val btn-val-export" id="btn-val-export" disabled onclick="exportValidatedItemlijst()">⬇ Export gecorrigeerde Itemlijst</button>
      <button class="btn-val btn-val-labels" id="btn-val-labels" disabled onclick="generateMerkenLabels()">🏷️ Genereer Merken/Labels</button>
      <div style="display:flex;align-items:center;gap:.3rem;margin-left:auto">
        <label style="font-family:var(--mono);font-size:.65rem;color:var(--muted);white-space:nowrap">Consignee:</label>
        <input type="text" id="val-consignee" class="val-consignee-input"
          value="PACIFIC SHIPBUILDING JSC"
          placeholder="Consignee naam"
          title="Verschijnt als Shipping Marks op de labels">
      </div>
      <div id="val-sheet-warnings"></div>
    </div>

    <!-- Summary -->
    <div id="val-summary"></div>

    <!-- Legend -->
    <div class="val-legend">
      <span><span class="lsq" style="background:rgba(34,197,94,.25)"></span> Correct</span>
      <span><span class="lsq" style="background:rgba(239,68,68,.35)"></span> Fout (verplicht veld / ongeldige waarde)</span>
      <span><span class="lsq" style="background:rgba(245,158,11,.25)"></span> Waarschuwing</span>
      <span><span class="lsq" style="background:rgba(0,180,216,.2)"></span> IHC invullen (klik om te bewerken)</span>
      <span>🔴 DG = Dangerous Goods</span>
    </div>

    <!-- Table -->
    <div class="val-table-wrap">
      <table class="val-table">
        <thead id="val-thead"></thead>
        <tbody id="val-tbody"></tbody>
      </table>
    </div>

  </section>
</div>

<!-- Minimal state needed for validator standalone mode -->
<script>
  // Stub fileData so validator.js (designed for PO-Matcher) doesn't break
  const fileData = { expediting: null, moeder: null };
  const allRows  = [];
  let currentFilter = 'validator';
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function setStatus(msg) { const el = document.getElementById('val-summary'); if (el) el.textContent = msg; }

  // When nav bar restores the expediting file, make it available for H-column lookup
  function onNavFileLoaded(role, buf, name) {
    if (role === 'expediting') {
      try {
        const wb = XLSX.read(buf, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, { defval: '' });
        fileData.expediting = { data, name };
      } catch(e) { console.warn('Could not parse expediting from IndexedDB', e); }
    }
  }
</script>
<script src="js/validator.js"></script>
<script src="../shared/shared.js"></script>
</body>
</html>
